<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NetGuard AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #080c10;
    --surface: #0d1117;
    --border:  #1a2332;
    --accent:  #00ff88;
    --accent2: #00b8ff;
    --danger:  #ff4444;
    --warn:    #ffaa00;
    --text:    #c9d1d9;
    --muted:   #4a5568;
    --mono:    'Share Tech Mono', monospace;
    --sans:    'Rajdhani', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.012) 2px, rgba(0,255,136,0.012) 4px);
    pointer-events: none;
    z-index: 999;
  }

  /* ── Header ── */
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo { font-family: var(--sans); font-weight: 700; font-size: 18px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--accent2); }

  .status-bar { margin-left: auto; display: flex; align-items: center; gap: 16px; font-size: 11px; color: var(--muted); }

  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-right: 5px; animation: pulse 2s infinite; }
  .status-dot.err { background: var(--danger); animation: none; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .scan-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .15s;
  }
  .scan-btn:hover { background: rgba(0,255,136,.08); }
  .scan-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Layout ── */
  .main { display: grid; grid-template-columns: 280px 1fr; flex: 1; overflow: hidden; min-height: 0; }

  /* ── Sidebar ── */
  .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }

  .sidebar-title { padding: 12px 16px; font-size: 10px; letter-spacing: 2px; color: var(--muted); border-bottom: 1px solid var(--border); text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }

  .badge { background: var(--danger); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-family: var(--sans); font-weight: 700; }

  .anomaly-list { flex: 1; overflow-y: auto; padding: 8px; }
  .anomaly-list::-webkit-scrollbar { width: 4px; }
  .anomaly-list::-webkit-scrollbar-thumb { background: var(--border); }

  .anomaly-card { border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: all .15s; font-size: 12px; position: relative; overflow: hidden; }
  .anomaly-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .anomaly-card.high::before   { background: var(--danger); }
  .anomaly-card.medium::before { background: var(--warn); }
  .anomaly-card.low::before    { background: var(--accent); }
  .anomaly-card:hover    { border-color: var(--accent); background: rgba(0,255,136,.04); }
  .anomaly-card.selected { border-color: var(--accent2); background: rgba(0,184,255,.06); }

  .anomaly-sev { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
  .high   .anomaly-sev { color: var(--danger); }
  .medium .anomaly-sev { color: var(--warn); }
  .low    .anomaly-sev { color: var(--accent); }

  .anomaly-detail { color: var(--text); line-height: 1.4; }
  .anomaly-time   { color: var(--muted); font-size: 10px; margin-top: 4px; }

  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); }

  /* ── Chat panel ── */
  .chat-panel { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); }

  .msg { display: flex; gap: 12px; animation: fadeIn .3s ease; }
  .msg.user { flex-direction: row-reverse; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .avatar { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; font-family: var(--sans); font-weight: 700; letter-spacing: 1px; }
  .ai-avatar   { background: linear-gradient(135deg,rgba(0,255,136,.2),rgba(0,184,255,.2)); border: 1px solid var(--accent);  color: var(--accent); }
  .user-avatar { background: rgba(0,184,255,.15); border: 1px solid var(--accent2); color: var(--accent2); }

  .bubble { max-width: 70%; padding: 12px 16px; border-radius: 4px; font-size: 13px; line-height: 1.7; }
  .ai-bubble   { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 0; }
  .user-bubble { background: rgba(0,184,255,.08); border: 1px solid rgba(0,184,255,.3); border-top-right-radius: 0; text-align: right; }
  .bubble code { background: rgba(0,255,136,.1); color: var(--accent); padding: 1px 5px; border-radius: 3px; font-size: 12px; }

  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: typing 1.2s infinite; }
  .typing-dot:nth-child(2){animation-delay:.2s} .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes typing { 0%,60%,100%{opacity:.2;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }

  /* ── Input area ── */
  .chat-input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }

  .context-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(0,184,255,.1); border: 1px solid rgba(0,184,255,.3); border-radius: 3px; padding: 4px 8px; font-size: 10px; color: var(--accent2); margin-bottom: 10px; }
  .ctx-remove { color: var(--muted); cursor: pointer; margin-left: 4px; }
  .ctx-remove:hover { color: var(--danger); }

  .input-row { display: flex; gap: 8px; }

  .chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border-color .15s; resize: none; height: 42px; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn { padding: 0 18px; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; font-family: var(--sans); font-weight: 700; font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: all .15s; text-transform: uppercase; }
  .send-btn:hover { background: #00cc6e; }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }

  .quick-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .quick-btn { padding: 4px 10px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: 10px; border-radius: 3px; cursor: pointer; transition: all .15s; }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Empty / error states ── */
  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }
  .empty-icon { font-size: 36px; opacity: .4; }

  .toast { position: fixed; bottom: 80px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 16px; font-size: 12px; color: var(--text); z-index: 100; animation: fadeIn .3s ease; }
  .toast.err  { border-color: var(--danger); color: var(--danger); }
  .toast.ok   { border-color: var(--accent); color: var(--accent); }

  .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--muted); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<header>
  <div class="logo">NET<span>GUARD</span> AI</div>
  <div class="status-bar">
    <span id="statusIndicator"><span class="status-dot" id="statusDot"></span><span id="statusText">CONNECTING...</span></span>
    <span id="interfaceLabel"></span>
    <span id="clock"></span>
    <button class="scan-btn" id="scanBtn" onclick="runScan()">⟳ RESCAN</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">
      ⚡ Live Anomalies
      <span class="badge" id="anomalyBadge" style="display:none">0</span>
    </div>
    <div class="anomaly-list" id="anomalyList">
      <div class="empty-state"><div class="spinner"></div>Scanning network...</div>
    </div>
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </div>

  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🛡️</div>
        <div>NetGuard AI is ready</div>
        <div style="font-size:11px">Select an anomaly from the sidebar or ask a question below</div>
      </div>
    </div>

    <div class="chat-input-area">
      <div id="contextBadgeArea"></div>
      <div class="input-row">
        <textarea class="chat-input" id="userInput" placeholder="Ask about anomalies, threats, or remediation steps..." onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
      <div class="quick-actions">
        <button class="quick-btn" onclick="quickAsk('Summarize all current anomalies and their risk level.')">Summarize anomalies</button>
        <button class="quick-btn" onclick="quickAsk('Which anomaly is most critical right now and why?')">Most critical</button>
        <button class="quick-btn" onclick="quickAsk('What remediation steps do you recommend for each anomaly?')">Remediation steps</button>
        <button class="quick-btn" onclick="quickAsk('Could these anomalies indicate a coordinated attack? Explain your reasoning.')">Attack pattern?</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const API_BASE = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
  ? 'http://localhost:5000'
  : '';  // same-origin in production

// ── State ─────────────────────────────────────────────────────
let anomalies       = [];
let selectedIdx     = null;
let chatHistory     = [];
let isLoading       = false;
let isScanning      = false;

// ── Clock ─────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour12: false });
}, 1000);

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type = 'ok', ms = 3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ── Scan ──────────────────────────────────────────────────────
async function runScan() {
  if (isScanning) return;
  isScanning = true;
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>SCANNING';
  document.getElementById('statusText').textContent = 'SCANNING...';
  document.getElementById('statusDot').className = 'status-dot';

  try {
    const res  = await fetch(`${API_BASE}/anomalies`);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Scan failed');

    anomalies = data.anomalies || [];
    renderSidebar(data);
    setStatus(true);
    toast(`Scan complete — ${anomalies.length} anomaly${anomalies.length !== 1 ? 'ies' : ''} found`, anomalies.length > 0 ? 'err' : 'ok');

  } catch (err) {
    setStatus(false);
    document.getElementById('anomalyList').innerHTML =
      `<div class="empty-state" style="color:var(--danger)">⚠ ${err.message}<br><br><span style="font-size:10px;color:var(--muted)">Is the Flask backend running?<br>cd backend && python app.py</span></div>`;
    toast(`Error: ${err.message}`, 'err', 5000);
  }

  btn.disabled = false;
  btn.textContent = '⟳ RESCAN';
  isScanning = false;
}

function setStatus(ok) {
  document.getElementById('statusDot').className = ok ? 'status-dot' : 'status-dot err';
  document.getElementById('statusText').textContent = ok ? 'MONITOR ACTIVE' : 'BACKEND OFFLINE';
}

function renderSidebar(data) {
  const list   = document.getElementById('anomalyList');
  const badge  = document.getElementById('anomalyBadge');
  const footer = document.getElementById('sidebarFooter');
  const iface  = document.getElementById('interfaceLabel');

  iface.textContent = data.dev_mode ? 'MOCK MODE' : `INTERFACE: ${data.interface || 'eth0'}`;
  footer.textContent = `Last scan: ${new Date(data.scanned_at).toLocaleTimeString()}`;

  if (anomalies.length === 0) {
    badge.style.display = 'none';
    list.innerHTML = '<div class="empty-state" style="padding:24px"><div style="font-size:24px">✅</div><div>No anomalies detected</div></div>';
    return;
  }

  badge.style.display = 'inline';
  badge.textContent = anomalies.length;
  list.innerHTML = '';

  anomalies.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = `anomaly-card ${a.severity}${selectedIdx === i ? ' selected' : ''}`;
    card.innerHTML = `
      <div class="anomaly-sev">${a.severity} · ${a.type.replace(/_/g,' ')}</div>
      <div class="anomaly-detail">${a.detail}</div>
      <div class="anomaly-time">${new Date(a.timestamp).toLocaleTimeString()}</div>
    `;
    card.onclick = () => selectAnomaly(i);
    list.appendChild(card);
  });
}

function selectAnomaly(i) {
  selectedIdx = i;
  renderSidebar({ anomalies, scanned_at: new Date().toISOString(), dev_mode: false });

  const a     = anomalies[i];
  const short = a.detail.length > 55 ? a.detail.slice(0, 55) + '…' : a.detail;
  document.getElementById('contextBadgeArea').innerHTML = `
    <div class="context-badge">
      📎 ${short}
      <span class="ctx-remove" onclick="clearContext()">✕</span>
    </div>
  `;
}

function clearContext() {
  selectedIdx = null;
  document.getElementById('contextBadgeArea').innerHTML = '';
  renderSidebar({ anomalies, scanned_at: new Date().toISOString(), dev_mode: false });
}

// ── Chat ──────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function hideEmpty() {
  const el = document.getElementById('emptyState');
  if (el) el.remove();
}

function appendMsg(role, html) {
  hideEmpty();
  const wrap = document.getElementById('chatMessages');
  const isAI = role === 'assistant';
  const div = document.createElement('div');
  div.className = `msg ${isAI ? 'ai' : 'user'}`;
  div.innerHTML = `
    <div class="avatar ${isAI ? 'ai-avatar' : 'user-avatar'}">${isAI ? 'AI' : 'YOU'}</div>
    <div class="bubble ${isAI ? 'ai-bubble' : 'user-bubble'}">${html}</div>
  `;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function showTyping() {
  hideEmpty();
  const wrap = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.id = 'typingEl';
  div.className = 'msg ai';
  div.innerHTML = `<div class="avatar ai-avatar">AI</div><div class="bubble ai-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingEl');
  if (el) el.remove();
}

function formatAI(text) {
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  isLoading   = true;
  document.getElementById('sendBtn').disabled = true;

  appendMsg('user', text);
  showTyping();

  chatHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message:         text,
        history:         chatHistory.slice(0, -1), // exclude last (already sent as message)
        anomalies:       anomalies,
        focused_anomaly: selectedIdx !== null ? anomalies[selectedIdx] : null,
      }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'AI request failed');

    chatHistory.push({ role: 'assistant', content: data.reply });
    removeTyping();
    appendMsg('assistant', formatAI(data.reply));

  } catch (err) {
    removeTyping();
    appendMsg('assistant', `⚠️ ${err.message}`);
    toast(`AI error: ${err.message}`, 'err', 5000);
    chatHistory.pop(); // remove failed user message from history
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

// ── Init ──────────────────────────────────────────────────────
runScan();
</script>
</body>
</html>
